<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狍子的个人网页</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            color: #333;
        }

        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }

        header {
            background: #0073e6;
            color: #fff;
            padding-top: 30px;
            min-height: 70px;
            border-bottom: #004a99 3px solid;
        }

        header a {
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 16px;
        }

        header ul {
            padding: 0;
            list-style: none;
        }

        header li {
            float: right;
            display: inline;
            padding: 0 20px;
        }

        .showcase {
            min-height: 400px;
            background: url('https://raw.githubusercontent.com/paozi0707/paozi.github.io/main/background.png') no-repeat center center/cover;
            text-align: center;
            color: #fff;
        }

        .showcase h1 {
            margin-top: 100px;
            font-size: 55px;
            margin-bottom: 10px;
        }

        .showcase p {
            font-size: 20px;
        }

        .content {
            padding: 20px;
            background: #fff;
            margin-bottom: 20px;
        }

        .content h2 {
            color: #0073e6;
        }

        .profile-img {
            border-radius: 50%;
            width: 150px;
            height: 150px;
        }

        .carousel {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .carousel img {
            width: 100%;
            height: auto;
        }

        .carousel-buttons {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        .carousel-buttons button {
            background-color: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 20px;
        }

        .audio-controls {
            text-align: center;
            margin-top: 20px;
        }

        .audio-controls button {
            background-color: #0073e6;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 0 10px;
        }
    </style>
</head>

<body>

<header>
    <div class="container">

        <ul>

</section>

<!-- 修复后的联系方式 -->

        <h2>联系方式</h2>

        <p>

            <a href="https://paozi0707.github.io/paozi.github.io/jumpwebsite" target="_blank">

    </div>
</section>

<!-- 图片轮播 -->
<section class="content">
    <div class="container">
        <h2>美图秀秀</h2>

        <div class="carousel">
            <a href="https://wallhaven.cc/w/x6yzoz"><img src="https://w.wallhaven.cc/full/x6/wallhaven-x6yzoz.jpg"></a>
            <a href="https://wallhaven.cc/w/3l828y"><img src="https://raw.githubusercontent.com/paozi0707/paozi.github.io/main/wallhaven-3l828y_1280x720.png"></a>
            <a href="https://wallhaven.cc/w/zyj28v"><img src="https://raw.githubusercontent.com/paozi0707/paozi.github.io/main/wallhaven-exq7wo_1280x720.png"></a>

            <div class="carousel-buttons">
                <button id="prevBtn">&#10094;</button>
                <button id="nextBtn">&#10095;</button>
            </div>
        </div>
    </div>
</section>

<!-- 音乐控制 -->
<section class="audio-controls">
    <button id="playBtn">播放音乐</button>
    <button id="pauseBtn">暂停音乐</button>
    <button id="restartBtn">重新播放</button>
</section>

<footer>
    <p>狍子的个人网页 &copy; 2024</p>
</footer>

<!-- 修复：移除 autoplay -->
<audio id="backgroundMusic" src="Throwaway.mp3" loop></audio>

<script>
    // 初始化轮播
    let currentSlide = 0;
    const slides = document.querySelectorAll('.carousel img');

    slides.forEach((img, i) => {
        img.style.display = i === 0 ? 'block' : 'none';
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
        slides[currentSlide].style.display = 'none';
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].style.display = 'block';
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
        slides[currentSlide].style.display = 'none';
        currentSlide = (currentSlide - 1 + slides.length) % slides.length;
        slides[currentSlide].style.display = 'block';
    });

    // 音乐控制
    const music = document.getElementById('backgroundMusic');

    document.getElementById('playBtn').onclick = () => music.play();
    document.getElementById('pauseBtn').onclick = () => music.pause();
    document.getElementById('restartBtn').onclick = () => {
        music.currentTime = 0;
        music.play();
    };
</script>

</body>
</html>
